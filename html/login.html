<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Sell</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <nav>
        <div class="logo">Sell</div>
        <ul id="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="about.html">À propos</a></li>
            <li><a href="contact.html">Contact</a></li>
            
            <li id="auth-link"><a href="login.html">Connexion</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h1>Connexion</h1>
    
            <!-- Dans votre formulaire HTML -->
<form id="loginForm">
    <div class="form-group">
        <label>Email</label>
        <!-- L'ID doit être EXACTEMENT 'email' -->
        <input type="email" id="email" required> 
    </div>
    <div class="form-group">
        <label>Mot de passe</label>
        <!-- L'ID doit être EXACTEMENT 'password' -->
        <input type="password" id="password" required>
    </div>
    <button type="submit">Se connecter</button>
</form>

    
            <div class="error-msg" id="errorMsg"></div>

            <a class="lien-inscription" href="inscription.html">Pas encore de compte? </a>
        </div>
        
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Sell</h3>
                <p>Votre destination mode incontournable.</p>
            </div>
            <div class="footer-section">
                <h4>Suivez-nous</h4>
                <div class="social-links">
                    <a href="#">Instagram</a>
                    <a href="#">Facebook</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">&copy; 2026 Sell.</div>
     </footer>    

    <!-- À placer juste avant la balise </body> -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
    
            // On récupère les éléments
            const emailField = document.getElementById('email');
            const passwordField = document.getElementById('password');
    
            // Sécurité : on vérifie s'ils existent avant de lire .value
            if (!emailField || !passwordField) {
                console.error("ERREUR : Les champs email ou password sont introuvables dans le HTML !");
                alert("Erreur technique : Formulaire mal configuré.");
                return;
            }
    
            const email = emailField.value;
            const password = passwordField.value;
    
            // ... reste du fetch ...
            fetch('http://localhost:3000/connexion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, mot_de_passe: password } )
            })
            .then(res => res.json())
            .then(user => {
                if (user.error) {
    alert(user.error);
} else {
    // 🔥 IMPORTANT
    localStorage.setItem("user_id", user.userId);

    localStorage.setItem("user_role", user.role);
    localStorage.setItem("user_nom", user.nom);
    console.log("REPONSE SERVEUR =", user);

    // Redirection
    window.location.href = (user.role === 'admin') 
        ? "admin.html" 
        : "index.html";
}
            })
            .catch(err => alert("Erreur de connexion au serveur"));

            
        });
    </script>
    


</body>
</html>
